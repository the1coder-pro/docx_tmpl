name: docx_tmpl
description: "A powerful, lightweight Dart and Flutter package that allows you to use Jinja2-style templating directly inside Microsoft Word (.docx) files."
version: 1.0.0
homepage: https://github.com/the1coder-pro/

environment:
  sdk: ^3.11.3
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  archive: ^4.0.9
  collection: ^1.19.1
  http: ^1.6.0
  path: ^1.9.1
  xml: ^7.0.1
  universal_io: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

